name: Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/fdnda-tickets-app:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/fdnda-tickets-app:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://ticketingfdnda.pe' }}
            NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME || 'Ticketing FDNDA' }}
            NEXT_PUBLIC_PAYMENTS_MODE=${{ vars.NEXT_PUBLIC_PAYMENTS_MODE || 'mock' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push tools image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: deps
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/fdnda-tickets-tools:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/fdnda-tickets-tools:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
