name: Publish Docker Images

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image owner
        id: vars
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "channel=latest" >> "$GITHUB_OUTPUT"
            echo "app_url=https://ticketingfdnda.pe" >> "$GITHUB_OUTPUT"
          else
            echo "channel=staging" >> "$GITHUB_OUTPUT"
            echo "app_url=https://staging.ticketingfdnda.pe" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/fdnda-tickets-app:${{ steps.vars.outputs.channel }}
            ghcr.io/${{ steps.vars.outputs.owner }}/fdnda-tickets-app:${{ steps.vars.outputs.channel }}-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ steps.vars.outputs.app_url }}
            NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME || 'Ticketing FDNDA' }}
            NEXT_PUBLIC_PAYMENTS_MODE=${{ vars.NEXT_PUBLIC_PAYMENTS_MODE || 'izipay' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push tools image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: tools
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/fdnda-tickets-tools:${{ steps.vars.outputs.channel }}
            ghcr.io/${{ steps.vars.outputs.owner }}/fdnda-tickets-tools:${{ steps.vars.outputs.channel }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
