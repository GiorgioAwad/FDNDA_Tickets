services:
  # ==================== Optional Local PostgreSQL ====================
  # Use only for compatibility or local-like production tests:
  # docker compose --profile local-db up -d db
  db:
    image: postgres:15-alpine
    container_name: fdnda_db
    profiles:
      - local-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-fdnda}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fdnda}
      POSTGRES_DB: ${DB_NAME:-fdnda_tickets}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fdnda} -d ${DB_NAME:-fdnda_tickets}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ==================== Prisma Migrations ====================
  migrate:
    image: ${TOOLS_IMAGE:-fdnda-tickets-tools:local}
    profiles:
      - tools
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${DB_USER:-fdnda}:${DB_PASSWORD:-fdnda}@db:5432/${DB_NAME:-fdnda_tickets}?sslmode=disable}
    command: ["/bin/sh", "-lc", "./node_modules/.bin/prisma migrate deploy"]
    networks:
      - internal

  # ==================== Next.js App ====================
  app:
    image: ${APP_IMAGE:-fdnda-tickets-app:local}
    container_name: fdnda_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://${DB_USER:-fdnda}:${DB_PASSWORD:-fdnda}@db:5432/${DB_NAME:-fdnda_tickets}?sslmode=disable}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_MIN: ${DB_POOL_MIN:-5}
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - internal
      - web

  # ==================== Background Worker ====================
  worker:
    image: ${TOOLS_IMAGE:-fdnda-tickets-tools:local}
    container_name: fdnda_worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://${DB_USER:-fdnda}:${DB_PASSWORD:-fdnda}@db:5432/${DB_NAME:-fdnda_tickets}?sslmode=disable}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_MIN: ${DB_POOL_MIN:-5}
    command: ["npm", "run", "worker"]
    networks:
      - internal

  # ==================== Caddy (Reverse Proxy + SSL) ====================
  caddy:
    image: caddy:2-alpine
    container_name: fdnda_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
